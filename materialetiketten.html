<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materialetiketten – Voortman Müller Opladen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1c1d1f; --ink-soft:#6b6d70; --line:#d8dadd; --paper:#ffffff; --bg:#eceded;
    --grey:#5e5f63; --red:#b1051d; --red-dark:#860414;
    --lw:105mm; --lh:74mm; --lf:1; --cols:2; --gap:0mm; --pm:0mm;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
  .app{max-width:1000px;margin:0 auto;padding:24px 20px 60px}

  /* ----- Kopf / Aktionsleiste ----- */
  .head{
    position:sticky;top:0;z-index:20;background:rgba(236,237,237,.92);backdrop-filter:blur(6px);
    display:flex;align-items:center;gap:12px;padding:12px 0 14px;margin-bottom:18px;border-bottom:1px solid var(--line);
  }
  .head img{height:32px;width:auto}
  .head .ht{line-height:1.05}
  .head .ht b{display:block;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}
  .head .ht span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red)}
  .head .spacer{flex:1}
  .printbtn{padding:11px 20px;border:none;border-radius:9px;cursor:pointer;background:var(--red);color:#fff;
    font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.03em;transition:.15s}
  .printbtn:hover{background:var(--red-dark)}
  .secbtn{padding:10px 16px;border:1px solid var(--line);border-radius:9px;cursor:pointer;background:#fff;color:var(--ink);
    font-family:inherit;font-size:13px;font-weight:600;transition:.15s}
  .secbtn:hover{border-color:var(--red);color:var(--red)}
  .searchbox{padding:10px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);
    font-family:inherit;font-size:13px;width:250px;outline:none}
  .searchbox:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(177,5,29,.1)}
  .editor input.dupe{border-color:#d98a00;background:#fff6e5}
  .dupeinfo{margin:0 0 10px;padding:8px 12px;border:1px solid #f0c36d;border-radius:8px;background:#fff8e6;
    color:#8a5a00;font-size:12.5px}
  .dupeinfo.hidden{display:none}
  .editor td.chk,.editor th.chk{width:30px;text-align:center}
  .editor td.chk input,.editor th.chk input{width:16px;height:16px;accent-color:var(--red);cursor:pointer}
  tr.unsel input:not([type=checkbox]){opacity:.45}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;
    box-shadow:0 1px 2px rgba(28,29,31,.04),0 8px 22px rgba(28,29,31,.05)}
  .card h2{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px}

  /* ----- Toolbar ----- */
  .toolbar{display:flex;flex-wrap:wrap;gap:18px 26px;align-items:flex-end}
  .tgroup label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  select{padding:9px 11px;font-family:inherit;font-size:14px;color:var(--ink);background:#f7f8f8;border:1px solid var(--line);border-radius:8px;outline:none}
  select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(177,5,29,.12)}
  .btns{display:flex;gap:6px}
  .btns button{font-size:12px;padding:8px 11px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--ink-soft);font-family:inherit}
  .btns button:hover{border-color:var(--red);color:var(--red)}
  .btns button.on{border-color:var(--red);background:var(--red);color:#fff}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
  .toggle input{width:16px;height:16px;accent-color:var(--red);cursor:pointer}
  .fitinfo{font-size:13px;color:var(--ink);background:#fdf2f3;border:1px solid #f3c6cc;border-radius:8px;padding:9px 12px}
  .fitinfo b{color:var(--red)}

  /* ----- Artikel-Editor ----- */
  .editor table{width:100%;border-collapse:collapse}
  .editor th{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);text-align:left;padding:0 8px 8px}
  .editor td{padding:3px 4px;vertical-align:middle}
  .editor input{width:100%;padding:8px 9px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#f7f8f8;border:1px solid var(--line);border-radius:7px;outline:none}
  .editor input.mono{font-family:'IBM Plex Mono',monospace}
  .editor input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(177,5,29,.1)}
  .editor select{width:100%;padding:8px 9px;font-family:inherit;font-size:13.5px;color:var(--ink);
    background:#f7f8f8;border:1px solid var(--line);border-radius:7px;outline:none;cursor:pointer}
  .editor select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(177,5,29,.1)}
  .editor td.num{width:26px;color:var(--ink-soft);font-size:12px;text-align:center}
  .editor td.act{width:64px;white-space:nowrap;text-align:right}
  .icobtn{width:26px;height:26px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--ink-soft);font-size:14px;line-height:1}
  .icobtn:hover{border-color:var(--red);color:var(--red)}
  .addbtn{margin-top:12px;padding:9px 16px;border:1px dashed var(--red);background:#fff;color:var(--red);border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
  .addbtn:hover{background:#fdf2f3}
  .colhead{font-size:10px;color:var(--ink-soft)}

  /* ----- Vorschau / A4-Bögen ----- */
  .previewhead{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 12px}
  .pagesWrap{overflow:hidden}
  .pages{display:flex;flex-direction:column;gap:20px;transform-origin:top left}
  .page{
    width:210mm;height:297mm;background:#fff;border:1px solid #ccced1;
    display:grid;grid-template-columns:repeat(var(--cols),var(--lw));grid-auto-rows:var(--lh);
    gap:var(--gap);padding:var(--pm);align-content:start;justify-content:center;
    box-shadow:0 4px 24px rgba(28,29,31,.12);
  }

  .lslot{width:var(--lw);height:var(--lh);overflow:hidden}
  .label{width:105mm;height:74mm;transform:scale(var(--lf));transform-origin:top left;
    background:#fff;border:1px solid #c2c5c9;display:flex;flex-direction:column;overflow:hidden;color:var(--ink)}
  .lbl-head{background:#fff;color:var(--grey);display:flex;align-items:center;gap:3mm;padding:2.4mm 4mm;min-height:13mm;border-bottom:1.4mm solid var(--red)}
  .lbl-head .logo-slot{display:flex;align-items:center;gap:2.6mm}
  .lbl-head img{max-height:9mm;max-width:24mm;object-fit:contain;display:block}
  .wordmark{line-height:1.05}
  .wordmark .w1{font-weight:700;font-size:3.7mm;letter-spacing:.02em;text-transform:uppercase;color:var(--grey);white-space:nowrap}
  .wordmark .w2{font-size:2.2mm;letter-spacing:.18em;text-transform:uppercase;color:var(--red)}
  .lbl-head .doctype{margin-left:auto;font-size:2.5mm;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);text-align:right;line-height:1.15}
  .lbl-body{flex:1;display:flex;padding:3.2mm 4mm;gap:4mm}
  .lbl-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .artikel{font-size:3.7mm;font-weight:700;color:var(--ink);line-height:1.12;margin-bottom:2mm;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sap-block{margin-bottom:1.2mm}
  .k{font-size:2.3mm;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .sap-val{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:7.2mm;letter-spacing:.02em;color:var(--red);line-height:1.05;word-break:break-all}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.8mm 3mm;margin-top:auto}
  .cell .k{margin-bottom:.4mm}
  .cell .v{font-size:3.9mm;font-weight:600;color:var(--ink);line-height:1.1;word-break:break-word}
  .cell .v.mono{font-family:'IBM Plex Mono',monospace;letter-spacing:.01em}
  .cell.full{grid-column:1 / -1}
  .qr-wrap{width:24mm;display:flex;flex-direction:column;align-items:center;gap:1.2mm}
  .qr-box{width:23mm;height:23mm;display:flex;align-items:center;justify-content:center}
  .qr-box img,.qr-box canvas{width:23mm !important;height:23mm !important}
  .qr-cap{font-size:2.1mm;letter-spacing:.08em;text-transform:uppercase;color:var(--grey)}
  .qr-wrap.hidden{display:none}

  @media print{
    @page{size:A4;margin:0}
    body{background:#fff}
    .app{max-width:none;padding:0}
    .head,.card,.previewhead{display:none !important}
    .pagesWrap{overflow:visible}
    .pages{gap:0;transform:none !important}
    .page{border:none;box-shadow:none;break-after:page}
    .page:last-child{break-after:auto}
  }
</style>
</head>

  <!-- Einstellungen -->
  <section class="card toolbar">

  const qrLibOK = typeof QRCode !== 'undefined';

  // Aufteilung: Spalten × Zeilen pro A4. Etikettgröße wird daraus + Abstand berechnet.
  const LAYOUTS = [
    {c:2, r:4}, {c:2, r:5}, {c:2, r:3}, {c:3, r:6}, {c:3, r:8}, {c:4, r:8}, {c:1, r:1}
  ];
  const AR = 105/74;            // festes Seitenverhältnis des Etiketts
  const PAGE_W = 210, PAGE_H = 297;

  let articles = [
    {sap:'100-2345', artikel:'Sechskantschraube M8×40 verzinkt', lagerort:'Halle 1 / ESC1', bestellgroesse:'50 Stk',  bestand:'120 Stk', lieferant:'Würth', liefnr:'40012'},
    {sap:'100-9876', artikel:'Bohrer HSS-Co 6,8 mm',             lagerort:'Halle 1 / ESC2', bestellgroesse:'200 Stk', bestand:'340 Stk', lieferant:'Hilti', liefnr:'40057'},
    {sap:'100-4567', artikel:'Pneumatikzylinder DSNU-25-100',    lagerort:'Halle 1 / ESC3', bestellgroesse:'10 Stk',  bestand:'6 Stk',   lieferant:'Festo', liefnr:'40103'}
  ];
  let mode = 'both';        // 'both' | 'logo' | 'text'
  let customLogo = null;
  let cols = 2, rows = 4;
  let marginMode = 'none';
  let gapMM = 2;
  let showQR = true;
  let suppliers = {};       // Lieferant -> Lieferanten-Nr. (lernt automatisch mit)

  // Feste Lagerorte für das Dropdown (hier bei Bedarf erweitern)
  const LAGERORTE = ['Halle 1 / ESC1', 'Halle 1 / ESC2', 'Halle 1 / ESC3'];

  // --- Eingabeformate ---
  // SAP-Nummer: immer xxx-xxxx (7 Ziffern, Bindestrich nach der 3.)
  function formatSAP(v, strict){
    const raw = String(v||'').replace(/\D/g,'');
    if(strict && raw.length!==7) return String(v||'').trim(); // abweichende Altwerte nicht verstümmeln
    const digits = raw.slice(0,7);
    return digits.length>3 ? digits.slice(0,3)+'-'+digits.slice(3) : digits;
  }
  // Bestellgröße: hinter einer Zahl immer " Stk"
  function formatBestell(v){
    const s = String(v||'').trim();
    const m = s.match(/^(\d+(?:[.,]\d+)?)\s*(stk\.?|stück|stueck)?$/i);
    return m ? m[1]+' Stk' : s;
  }

  // --- Lieferanten-Verzeichnis ---
  function normName(s){ return (s||'').trim(); }
  function learnSupplier(name, nr){
    name = normName(name); nr = (nr||'').trim();
    if(name && nr){ suppliers[name] = nr; updateSupplierList(); }
  }
  function learnFromArticles(){ articles.forEach(a=> learnSupplier(a.lieferant, a.liefnr)); }
  function updateSupplierList(){
    const dl = $('#lieferantenList'); dl.innerHTML='';
    Object.keys(suppliers).sort((a,b)=>a.localeCompare(b,'de')).forEach(name=>{
      const o = document.createElement('option');
      o.value = name; o.label = 'Nr. ' + suppliers[name];
      dl.appendChild(o);
    });
  }
  function findSupplier(name){
    name = normName(name).toLowerCase();
    if(!name) return null;
    const key = Object.keys(suppliers).find(k=>k.toLowerCase()===name);
    return key ? {name:key, nr:suppliers[key]} : null;
  }
  function findSupplierByNr(nr){
    nr = (nr||'').trim();
    if(!nr) return null;
    const key = Object.keys(suppliers).find(k=>suppliers[k]===nr);
    return key ? {name:key, nr:nr} : null;
  }

  function computeLayout(){
    const pm = marginMode==='none' ? 0 : 7;
    const g  = gapMM;
    const wByW = (PAGE_W - 2*pm - (cols-1)*g) / cols;   // max. Breite je Spalte
    const hByH = (PAGE_H - 2*pm - (rows-1)*g) / rows;    // max. Höhe je Zeile
    const lblH = Math.min(hByH, wByW/AR);                // größtes Etikett mit festem Verhältnis
    const lblW = lblH * AR;
    return {pm, g, lblW, lblH, perPage:cols*rows};
  }

  function wordmarkHTML(){
    return '<div class="wordmark"><div class="w1">Voortman&nbsp;Müller</div><div class="w2">Opladen</div></div>';
  }

  // --- Aufteilung-Dropdown füllen ---
  function fillLayouts(){
    const sel = $('#size'); sel.innerHTML='';
    LAYOUTS.forEach((L,i)=>{
      const o = document.createElement('option');
      o.value = i;
      o.textContent = L.c + ' × ' + L.r + ' = ' + (L.c*L.r) + ' pro A4' + (i===0?' (Standard)':'');
      sel.appendChild(o);
    });
    const idx = LAYOUTS.findIndex(L=>L.c===cols && L.r===rows);
    sel.value = idx<0 ? 0 : idx;
  }

  // --- Editor-Zeilen ---
  function renderRows(){
    const tb = $('#rows'); tb.innerHTML='';
    articles.forEach((a,i)=>{
      const tr = document.createElement('tr');
      if(a.sel===false) tr.className='unsel';
      tr.innerHTML =
        '<td class="chk"><input type="checkbox" data-sel="'+i+'" title="Für Druck auswählen"'+(a.sel!==false?' checked':'')+'></td>'+
        '<td class="num">'+(i+1)+'</td>'+
        '<td><input class="mono" data-i="'+i+'" data-k="sap" value="'+esc(a.sap)+'" placeholder="000-0000" maxlength="8" inputmode="numeric"></td>'+
        '<td><input data-i="'+i+'" data-k="artikel" value="'+esc(a.artikel)+'" placeholder="Bezeichnung"></td>'+
        '<td>'+lagerortSelect(i, a.lagerort)+'</td>'+
        '<td><input data-i="'+i+'" data-k="bestellgroesse" value="'+esc(a.bestellgroesse)+'" placeholder="z.B. 50"></td>'+
        '<td><input data-i="'+i+'" data-k="bestand" value="'+esc(a.bestand)+'" placeholder="z.B. 120" title="Nur für Liste/Excel – wird nicht gedruckt"></td>'+
        '<td><input data-i="'+i+'" data-k="lieferant" list="lieferantenList" value="'+esc(a.lieferant)+'" placeholder="Lieferant"></td>'+
        '<td><input class="mono" data-i="'+i+'" data-k="liefnr" value="'+esc(a.liefnr)+'" placeholder="Lief.-Nr."></td>'+
        '<td class="act"><button class="icobtn" data-dup="'+i+'" title="Duplizieren">⧉</button> '+
            '<button class="icobtn" data-del="'+i+'" title="Löschen">✕</button></td>';
      tb.appendChild(tr);
    });
    syncSelAll();
    applyFilter();
    markDuplicates();
  }
  // --- Suche: Artikelliste nach SAP-Nr. oder Beschreibung filtern ---
  function applyFilter(){
    const term = ($('#searchBox').value||'').trim().toLowerCase();
    $('#rows').querySelectorAll('tr').forEach((tr,i)=>{
      const a = articles[i]; if(!a) return;
      const hit = !term
        || (a.sap||'').toLowerCase().includes(term)
        || (a.sap||'').replace(/\D/g,'').includes(term.replace(/\D/g,'')||'\u0000')
        || (a.artikel||'').toLowerCase().includes(term);
      tr.style.display = hit ? '' : 'none';
    });
  }
  // --- Dopplungsprüfung: doppelte SAP-Nummern markieren ---
  function markDuplicates(){
    const count = {};
    articles.forEach(a=>{
      const s = (a.sap||'').trim();
      if(s) count[s] = (count[s]||0)+1;
    });
    const dupes = Object.keys(count).filter(s=>count[s]>1);
    $('#rows').querySelectorAll('input[data-k="sap"]').forEach(inp=>{
      const isDupe = dupes.includes(inp.value.trim());
      inp.classList.toggle('dupe', isDupe);
      inp.title = isDupe ? 'Doppelte SAP-Nummer – kommt mehrfach in der Liste vor!' : '';
    });
    const info = $('#dupeInfo');
    if(dupes.length){
      info.textContent = '⚠ Dopplung gefunden: SAP-Nummer'+(dupes.length>1?'n':'')+' '+dupes.join(', ')+' '+(dupes.length>1?'kommen':'kommt')+' mehrfach vor (orange markiert).';
      info.classList.remove('hidden');
    }else{
      info.classList.add('hidden');
    }
  }
  function syncSelAll(){
    const master = $('#selAll'); if(!master) return;
    const total = articles.length;
    const sel = articles.filter(a=>a.sel!==false).length;
    master.checked = total>0 && sel===total;
    master.indeterminate = sel>0 && sel<total;
  }
  function esc(s){ return (s||'').replace(/"/g,'&quot;'); }
  function escT(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function lagerortSelect(i, current){
    current = (current||'').trim();
    // Bestehende Werte, die (noch) nicht in der festen Liste stehen, bleiben wählbar
    const opts = LAGERORTE.includes(current) || !current ? LAGERORTE : [current].concat(LAGERORTE);
    let html = '<select data-i="'+i+'" data-k="lagerort" style="width:100%">';
    html += '<option value=""'+(current===''?' selected':'')+'>– Lagerort wählen –</option>';
    opts.forEach(o=>{
      html += '<option value="'+esc(o)+'"'+(o===current?' selected':'')+'>'+escT(o)+'</option>';
    });
    return html + '</select>';
  }

  // --- Ein Etikett bauen ---
  function makeLabel(a){
    const node = $('#labelTpl').content.cloneNode(true);
    const slot = node.querySelector('.logo-slot');
    if(mode==='both' || mode==='logo'){
      const im = document.createElement('img'); im.src = customLogo||DEFAULT_LOGO; im.alt='Logo'; slot.appendChild(im);
    }
    if(mode==='both' || mode==='text'){ slot.insertAdjacentHTML('beforeend', wordmarkHTML()); }
    const get = k => (a[k]||'').trim() || '—';
    node.querySelectorAll('[data-f]').forEach(el=> el.textContent = get(el.dataset.f));
    const qrWrap = node.querySelector('.qr-wrap');
    const sap = get('sap');
    if(showQR && qrLibOK && sap!=='—'){
      const box = node.querySelector('.qr-box');
      try{ new QRCode(box,{text:sap,width:120,height:120,colorDark:'#1c1d1f',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M}); }
      catch(e){ qrWrap.classList.add('hidden'); }
    }else{ qrWrap.classList.add('hidden'); }
    return node;
  }

  // --- A4-Bögen aufbauen ---
  function buildPreview(){
    const f = computeLayout();
    const root = document.documentElement.style;
    root.setProperty('--lw', f.lblW+'mm');
    root.setProperty('--lh', f.lblH+'mm');
    root.setProperty('--lf', (f.lblW/105));
    root.setProperty('--cols', cols);
    root.setProperty('--gap', f.g+'mm');
    root.setProperty('--pm', f.pm+'mm');

    const pages = $('#pages'); pages.innerHTML='';
    const selected = articles.filter(a=>a.sel!==false);
    const list = selected.length ? selected : [{sap:'',artikel:'',lagerort:'',bestellgroesse:'',lieferant:'',liefnr:''}];
    const nPages = Math.max(1, Math.ceil(list.length / f.perPage));
    for(let p=0;p<nPages;p++){
      const page = document.createElement('div'); page.className='page';
      list.slice(p*f.perPage,(p+1)*f.perPage).forEach(a=> page.appendChild(makeLabel(a)));
      pages.appendChild(page);
    }
    $('#fitinfo').innerHTML = '<b>'+cols+'×'+rows+' = '+f.perPage+'</b> Etiketten/A4 · Etikett '+
      f.lblW.toFixed(0)+'×'+f.lblH.toFixed(0)+' mm · <b>'+selected.length+' von '+articles.length+'</b> Artikeln ausgewählt · '+nPages+' Seite(n)';
    scalePreview();
    save();
  }

  // --- Vorschau auf Bildschirmbreite skalieren ---
  function scalePreview(){
    const mm = 96/25.4;
    const wrap = $('#pagesWrap');
    const pages = $('#pages');
    const avail = wrap.clientWidth;
    const scale = Math.min(1, avail/(PAGE_W*mm));
    pages.style.transform = 'scale('+scale+')';
    pages.style.transformOrigin = 'top left';
    wrap.style.height = (pages.offsetHeight*scale)+'px';
  }

  // --- Speichern / Laden ---
  function save(){
    try{ localStorage.setItem(STORE, JSON.stringify({articles,mode,customLogo,cols,rows,marginMode,gapMM,showQR,suppliers})); }catch(e){}
  }
  function load(){
    try{
      const s = JSON.parse(localStorage.getItem(STORE)||'{}');
      if(Array.isArray(s.articles)&&s.articles.length) articles = s.articles;
      if(s.mode) mode = s.mode;
      if('customLogo' in s) customLogo = s.customLogo;
      if(s.cols) cols = s.cols;
      if(s.rows) rows = s.rows;
      if(s.marginMode) marginMode = s.marginMode;
      if(typeof s.gapMM==='number') gapMM = s.gapMM;
      if(typeof s.showQR==='boolean') showQR = s.showQR;
      if(s.suppliers && typeof s.suppliers==='object') suppliers = s.suppliers;
    }catch(e){}
    articles.forEach(a=>{
      if(a.sel===undefined) a.sel = true;
      if(a.bestand===undefined) a.bestand = '';
      a.sap = formatSAP(a.sap, true);            // nur formatieren, wenn genau 7 Ziffern
      a.bestellgroesse = formatBestell(a.bestellgroesse);
      a.bestand = formatBestell(a.bestand);
    });
  }

  function setMode(m){
    mode = m;
    document.querySelectorAll('#modeBtns button').forEach(b=>b.classList.remove('on'));
    ({both:'#modeBoth',logo:'#modeLogo',text:'#modeText'})[m] && $(({both:'#modeBoth',logo:'#modeLogo',text:'#modeText'})[m]).classList.add('on');
    buildPreview();
  }

  // ---- Events ----
  $('#rows').addEventListener('input', e=>{
    const el = e.target;
    if(el.dataset.sel!=null){                       // Druck-Auswahl je Zeile
      articles[+el.dataset.sel].sel = el.checked;
      el.closest('tr').classList.toggle('unsel', !el.checked);
      syncSelAll(); buildPreview();
      return;
    }
    if(el.dataset.i==null) return;
    const i = +el.dataset.i, k = el.dataset.k;
    articles[i][k] = el.value;

    // SAP-Nummer beim Tippen automatisch als xxx-xxxx formatieren
    if(k==='sap'){
      const f = formatSAP(el.value, false);
      if(el.value!==f) el.value = f;
      articles[i].sap = f;
      markDuplicates();
    }

    // Lieferant eingegeben/gewählt -> Lieferanten-Nr. automatisch setzen
    if(k==='lieferant'){
      const hit = findSupplier(el.value);
      if(hit){
        articles[i].liefnr = hit.nr;
        const nrInput = $('#rows').querySelector('input[data-i="'+i+'"][data-k="liefnr"]');
        if(nrInput) nrInput.value = hit.nr;
      }
    }
    // Lieferanten-Nr. eingegeben -> Lieferant automatisch setzen (falls bekannt)
    if(k==='liefnr'){
      const hit = findSupplierByNr(el.value);
      if(hit && !normName(articles[i].lieferant)){
        articles[i].lieferant = hit.name;
        const nameInput = $('#rows').querySelector('input[data-i="'+i+'"][data-k="lieferant"]');
        if(nameInput) nameInput.value = hit.name;
      }
    }
    buildPreview();
  });
  // Neue Lieferant/Nr.-Paare erst beim Verlassen des Feldes lernen (keine halben Namen)
  $('#rows').addEventListener('change', e=>{
    const el = e.target;
    if(el.dataset.i==null) return;
    const a = articles[+el.dataset.i];
    if(el.dataset.k==='lieferant' || el.dataset.k==='liefnr'){
      learnSupplier(a.lieferant, a.liefnr); save();
    }
    // Bestellgröße/Lagerbestand: aus "50" wird beim Verlassen des Feldes "50 Stk"
    if(el.dataset.k==='bestellgroesse' || el.dataset.k==='bestand'){
      const f = formatBestell(el.value);
      if(el.value!==f){ el.value = f; a[el.dataset.k] = f; buildPreview(); }
    }
  });
  $('#selAll').addEventListener('change', e=>{
    articles.forEach(a=> a.sel = e.target.checked);
    renderRows(); buildPreview();
  });
  $('#searchBox').addEventListener('input', applyFilter);
  $('#rows').addEventListener('click', e=>{
    const del = e.target.dataset.del, dup = e.target.dataset.dup;
    if(del!=null){ articles.splice(+del,1); renderRows(); buildPreview(); }
    else if(dup!=null){ articles.splice(+dup+1,0,Object.assign({},articles[+dup])); renderRows(); buildPreview(); }
  });
  $('#addBtn').addEventListener('click', ()=>{
    articles.push({sap:'',artikel:'',lagerort:'',bestellgroesse:'',bestand:'',lieferant:'',liefnr:'',sel:true});
    renderRows(); buildPreview();
    const ins = $('#rows').querySelectorAll('input.mono'); ins[ins.length-1].focus();
  });

  $('#modeBoth').addEventListener('click', ()=>setMode('both'));
  $('#modeLogo').addEventListener('click', ()=>setMode('logo'));
  $('#modeText').addEventListener('click', ()=>setMode('text'));
  $('#size').addEventListener('change', e=>{ const L=LAYOUTS[+e.target.value]; cols=L.c; rows=L.r; buildPreview(); });
  $('#margin').addEventListener('change', e=>{ marginMode = e.target.value; buildPreview(); });
  $('#gap').addEventListener('change', e=>{ gapMM = parseFloat(e.target.value); buildPreview(); });
  $('#qrToggle').addEventListener('change', e=>{ showQR = e.target.checked; buildPreview(); });
  $('#logoInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = ev=>{ customLogo = ev.target.result; if(mode==='text') mode='both'; setMode(mode); };
    r.readAsDataURL(file);
  });
  // ---- Excel-Export ----
  const XL_HEADERS = ['SAP-Nummer','Artikelbeschriftung','Lagerort','Bestellgröße','Lagerbestand','Lieferant','Lieferanten-Nr.'];
  $('#excelExportBtn').addEventListener('click', ()=>{
    if(typeof XLSX==='undefined'){ alert('Excel-Bibliothek konnte nicht geladen werden (Internetverbindung prüfen).'); return; }
    const data = articles.map(a=>({
      'SAP-Nummer': a.sap||'', 'Artikelbeschriftung': a.artikel||'', 'Lagerort': a.lagerort||'',
      'Bestellgröße': a.bestellgroesse||'', 'Lagerbestand': a.bestand||'',
      'Lieferant': a.lieferant||'', 'Lieferanten-Nr.': a.liefnr||''
    }));
    const ws = XLSX.utils.json_to_sheet(data, {header: XL_HEADERS});
    ws['!cols'] = [{wch:14},{wch:40},{wch:22},{wch:14},{wch:14},{wch:20},{wch:16}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Artikel');
    const d = new Date(), pad = n=>String(n).padStart(2,'0');
    XLSX.writeFile(wb, 'Materialetiketten_'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'.xlsx');
  });

  // ---- Excel-Import ----
  $('#excelImportBtn').addEventListener('click', ()=> $('#excelInput').click());
  $('#excelInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    if(typeof XLSX==='undefined'){ alert('Excel-Bibliothek konnte nicht geladen werden (Internetverbindung prüfen).'); e.target.value=''; return; }
    const r = new FileReader();
    r.onload = ev=>{
      try{
        const wb = XLSX.read(ev.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        if(!rows.length){ alert('Die Datei enthält keine Datenzeilen.'); return; }
        // Spalten flexibel zuordnen (Groß-/Kleinschreibung und Varianten egal)
        const keyMap = {};
        Object.keys(rows[0]).forEach(h=>{
          const n = h.toLowerCase().replace(/[\s._-]/g,'');
          if(n.includes('sap')) keyMap.sap = h;
          else if(n.includes('artikel')||n.includes('bezeichnung')||n.includes('beschrift')) keyMap.artikel = h;
          else if(n.includes('bestand')) keyMap.bestand = h;   // vor Lagerort prüfen ("Lagerbestand" enthält auch "lager")
          else if(n.includes('lagerort')||n.includes('lager')) keyMap.lagerort = h;
          else if(n.includes('bestell')||n.includes('menge')||n.includes('größe')||n.includes('groesse')) keyMap.bestellgroesse = h;
          else if(n.includes('lieferant')&&(n.includes('nr')||n.includes('nummer'))) keyMap.liefnr = h;
          else if(n.includes('lieferant')) keyMap.lieferant = h;
        });
        if(!keyMap.sap && !keyMap.artikel){
          alert('Keine passenden Spalten gefunden. Erwartet werden Überschriften wie:\n' + XL_HEADERS.join(', '));
          return;
        }
        const val = (row,k)=> keyMap[k]!==undefined ? String(row[keyMap[k]]??'').trim() : '';
        const imported = rows.map(row=>({
          sap: formatSAP(val(row,'sap'), true), artikel: val(row,'artikel'), lagerort: val(row,'lagerort'),
          bestellgroesse: formatBestell(val(row,'bestellgroesse')), bestand: formatBestell(val(row,'bestand')),
          lieferant: val(row,'lieferant'), liefnr: val(row,'liefnr'), sel:true
        })).filter(a=> a.sap||a.artikel||a.lieferant);
        if(!imported.length){ alert('Keine verwertbaren Zeilen gefunden.'); return; }
        const replace = articles.length===0 ? true
          : confirm(imported.length+' Artikel gefunden.\n\nOK = vorhandene Liste ERSETZEN\nAbbrechen = an vorhandene Liste ANHÄNGEN');
        articles = replace ? imported : articles.concat(imported);
        learnFromArticles();
        renderRows(); buildPreview();
      }catch(err){
        alert('Die Datei konnte nicht gelesen werden. Bitte eine gültige .xlsx-, .xls- oder .csv-Datei verwenden.');
      }finally{
        e.target.value='';
      }
    };
    r.readAsArrayBuffer(file);
  });

  // ---- Komplette Sicherung (Etiketten + Einstellungen) speichern/laden ----
  function syncUI(){
    $('#margin').value = marginMode;
    $('#gap').value = gapMM;
    $('#qrToggle').checked = showQR;
    fillLayouts();
    renderRows();
    setMode(mode);      // ruft buildPreview() auf
  }
  $('#backupSaveBtn').addEventListener('click', ()=>{
    const backup = {
      typ: 'voortman_etiketten_sicherung', version: 1, gespeichert: new Date().toISOString(),
      articles, suppliers, mode, customLogo, cols, rows, marginMode, gapMM, showQR
    };
    const blob = new Blob([JSON.stringify(backup, null, 1)], {type:'application/json'});
    const d = new Date(), pad = n=>String(n).padStart(2,'0');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Etiketten_Sicherung_'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  });
  $('#backupLoadBtn').addEventListener('click', ()=> $('#backupInput').click());
  $('#backupInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev=>{
      try{
        const s = JSON.parse(ev.target.result);
        if(s.typ!=='voortman_etiketten_sicherung' || !Array.isArray(s.articles)){
          alert('Das ist keine gültige Etiketten-Sicherungsdatei.'); return;
        }
        if(!confirm('Sicherung vom '+(s.gespeichert ? new Date(s.gespeichert).toLocaleString('de-DE') : 'unbekannt')+
          ' mit '+s.articles.length+' Artikel(n) laden?\n\nAchtung: Die aktuelle Liste und alle Einstellungen werden ersetzt.')) return;
        articles = s.articles;
        if(s.suppliers && typeof s.suppliers==='object') suppliers = s.suppliers;
        if(s.mode) mode = s.mode;
        if('customLogo' in s) customLogo = s.customLogo;
        if(s.cols) cols = s.cols;
        if(s.rows) rows = s.rows;
        if(s.marginMode) marginMode = s.marginMode;
        if(typeof s.gapMM==='number') gapMM = s.gapMM;
        if(typeof s.showQR==='boolean') showQR = s.showQR;
        articles.forEach(a=>{
          if(a.sel===undefined) a.sel = true;
          if(a.bestand===undefined) a.bestand = '';
        });
        learnFromArticles();
        updateSupplierList();
        syncUI();
        save();
      }catch(err){
        alert('Die Sicherungsdatei konnte nicht gelesen werden.');
      }finally{
        e.target.value='';
      }
    };
    r.readAsText(file);
  });

  $('#printBtn').addEventListener('click', ()=>{
    if(!articles.some(a=>a.sel!==false)){
      alert('Kein Etikett ausgewählt. Bitte links in der Liste mindestens einen Artikel ankreuzen.');
      return;
    }
    window.print();
  });
  window.addEventListener('resize', scalePreview);

  if(!qrLibOK){ showQR=false; $('#qrToggle').checked=false; $('#qrToggle').disabled=true;
    $('#qrToggle').parentElement.style.opacity=.5; }

  // ---- Init ----
  load();
  learnFromArticles();
  updateSupplierList();
  $('#margin').value = marginMode;
  $('#gap').value = gapMM;
  $('#qrToggle').checked = showQR;
  fillLayouts();
  renderRows();
  setMode(mode);
})();
</script>
</body>
</html>
